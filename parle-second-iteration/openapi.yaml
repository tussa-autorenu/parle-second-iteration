openapi: 3.0.3
info:
  title: Parle Tesla Control Service
  version: 0.1.0
servers:
  - url: http://localhost:8080
security:
  - ParleApiKey: []
components:
  securitySchemes:
    ParleApiKey:
      type: apiKey
      in: header
      name: x-parle-api-key
  schemas:
    FailResponse:
      type: object
      properties:
        ok: { type: boolean, example: false }
        error:
          type: object
          properties:
            reason: { type: string, example: offline }
            message: { type: string }
            details: { nullable: true }
paths:
  /vehicles:
    get:
      summary: List vehicles with cached telemetry
      responses:
        "200": { description: OK }
        "401":
          description: Tesla auth error — token rejected (code tesla_auth_error)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FailResponse" }
        "409":
          description: Vehicle pairing required (code tesla_pairing_required)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FailResponse" }
        "429":
          description: Tesla rate limited (code tesla_rate_limited)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FailResponse" }
        "502":
          description: Tesla upstream error (code tesla_upstream_error)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FailResponse" }
  /vehicles/{id}:
    get:
      summary: Get vehicle + state (refreshes if needed)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FailResponse" }
  /vehicles/{id}/wake:
    post:
      summary: Wake
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
  /vehicles/{id}/unlock:
    post:
      summary: Unlock (wake-first)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
  /vehicles/{id}/enable-drive:
    post:
      summary: Enable drive (wake-first)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
  /vehicles/{id}/lock:
    post:
      summary: Lock (wake-first)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
  /vehicles/{id}/ready:
    post:
      summary: Ready Vehicle (wake -> unlock -> enable-drive)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
  /auth/tesla/disconnect:
    post:
      tags: [auth]
      summary: Disconnect Tesla account for the authenticated user
      description: >
        Removes stored Tesla OAuth tokens and any pending OAuth sessions
        for the user identified by the x-triggered-by header.
      parameters:
        - in: header
          name: x-parle-api-key
          required: true
          schema: { type: string }
          description: Service-to-service shared secret
        - in: header
          name: x-triggered-by
          required: true
          schema: { type: string }
          description: Supabase user ID of the user to disconnect
      responses:
        "200":
          description: Tesla account disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      disconnected: { type: boolean, example: true }
        "400":
          description: Missing or invalid x-triggered-by header
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FailResponse" }
        "401":
          description: Missing or invalid x-parle-api-key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FailResponse" }
  /logs/commands:
    get:
      summary: List command logs
      responses:
        "200": { description: OK }
